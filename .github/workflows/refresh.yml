name: Refresh API data

on:
  schedule:
    - cron: "7,37 * * * *"   # twice hourly, offset from the top of the hour
  workflow_dispatch: {}

permissions:
  contents: write

concurrency:
  group: refresh
  cancel-in-progress: true

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Rebuild API endpoints from live sources
        run: node scripts/build-api.mjs
      - name: Commit and push if changed
        run: |
          git config user.name "wattwindow-bot"
          git config user.email "actions@github.com"
          git add api
          git diff --cached --quiet && echo "No changes" && exit 0
          git commit -m "data: refresh $(date -u +%Y-%m-%dT%H:%MZ)"
          git push
